<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Stored Messages</title>

    <link rel="stylesheet"
          href="/static/style.css">

</head>

<body>

<h1>Stored Redacted Messages</h1>

<div class="form-container">

    <form action="/submit"
          method="post">

        <input type="text"
               name="message"
               placeholder="Enter your message"
               required>

        <button type="submit">
            Redact
        </button>

    </form>

</div>

<div class="table-container">

    <table>

        <tr>
            <th>ID</th>
            <th>Redacted Message</th>
            <th>Action</th>
        </tr>

        {% for msg in messages %}

        <tr>

            <td>{{ msg.id }}</td>

            <td class="message">
                {{ msg.redacted_message }}
            </td>

            <td>

                <form action="/delete/{{ msg.id }}"
                      method="post">

                    <button type="submit"
                            class="delete-btn">

                        Delete

                    </button>

                </form>

            </td>

        </tr>

        {% endfor %}

    </table>

</div>

</body>
</html>
